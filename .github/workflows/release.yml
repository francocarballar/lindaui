name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # changesets empuja el commit/tag de version
      pull-requests: write # changesets abre/actualiza el "Version Packages" PR
      id-token: write # OIDC: auth a npm sin token + provenance attestation
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # OIDC Trusted Publishing necesita npm >= 11.5 (el runner trae 10.x)
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo build

      - uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Provenance attestation (supply-chain): requiere id-token: write
          NPM_CONFIG_PROVENANCE: true
          # Bootstrap: token SOLO para el primer publish (crea los 3 paquetes).
          # Tras configurar Trusted Publisher en npmjs.com por paquete, OIDC toma
          # el control automaticamente; borra el secret NPM_TOKEN + esta linea.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
