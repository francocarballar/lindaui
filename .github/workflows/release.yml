name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # changesets empuja el commit/tag de version
      pull-requests: write # changesets abre/actualiza el "Version Packages" PR
      # id-token: write  # RE-AGREGAR al configurar OIDC Trusted Publisher.
      # Con id-token presente pnpm intenta OIDC primero; sin Trusted Publisher
      # el token-exchange da 404 y, con provenance activa, el publish con token
      # termina en E404. Hasta configurar OIDC, publicamos con token puro.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/common-actions/install

      # OIDC Trusted Publishing necesita npm >= 11.5 (el runner trae 10.x).
      # Pinneado a major: un npm@latest sorpresivo ya rompió el publish una vez
      # (changesets + npm 11, ver anti-regresión #13).
      - run: npm install -g npm@11

      - run: pnpm turbo build

      # Gate: nunca publicar sin la suite verde (un push directo a main
      # saltea el CI de PRs).
      - run: pnpm turbo test

      - uses: changesets/action@v1
        with:
          # NO usar `changeset publish`: changesets@2.31 + npm 11 crashea en
          # isAlreadyPublishedError (TypeError ...reading 'includes') al parsear
          # la respuesta de npm, enmascarando el error real. `pnpm -r publish` es
          # robusto, reemplaza workspace:*, saltea paquetes ya publicados, y
          # respeta NPM_CONFIG_PROVENANCE. El Version PR lo sigue armando
          # changesets (este step solo cambia el comando de publish).
          publish: pnpm -r publish --access public --no-git-checks
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # AUTH: setup-node (registry-url) setea NPM_CONFIG_USERCONFIG -> su
          # .npmrc con _authToken=${NODE_AUTH_TOKEN}. Ese .npmrc gana sobre el
          # que escribe changesets/action, asi que el token DEBE llegar como
          # NODE_AUTH_TOKEN (no solo NPM_TOKEN), sino resuelve a vacio -> E404.
          # NPM_TOKEN queda para que changesets/action no caiga a OIDC.
          # NPM_CONFIG_PROVENANCE: true  # RE-AGREGAR con id-token: write SOLO
          # tras configurar OIDC Trusted Publisher (provenance necesita OIDC).
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
