name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # changesets empuja el commit/tag de version
      pull-requests: write # changesets abre/actualiza el "Version Packages" PR
      id-token: write # OIDC: auth a npm sin token + provenance attestation
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # OIDC Trusted Publishing necesita npm >= 11.5 (el runner trae 10.x)
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo build

      - uses: changesets/action@v1
        with:
          # NO usar `changeset publish`: changesets@2.31 + npm 11 crashea en
          # isAlreadyPublishedError (TypeError ...reading 'includes') al parsear
          # la respuesta de npm, enmascarando el error real. `pnpm -r publish` es
          # robusto, reemplaza workspace:*, saltea paquetes ya publicados, y
          # respeta NPM_CONFIG_PROVENANCE. El Version PR lo sigue armando
          # changesets (este step solo cambia el comando de publish).
          publish: pnpm -r publish --access public --no-git-checks
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Provenance attestation (supply-chain): requiere id-token: write
          NPM_CONFIG_PROVENANCE: true
          # El secret NPM_TOKEN DEBE bypassear 2FA (Automation o granular con
          # "bypass 2FA"); un token sin bypass da E403 que npm enmascara como
          # E404 en el PUT. changesets/action lo lee como NPM_TOKEN (no
          # NODE_AUTH_TOKEN) y escribe el .npmrc. Tras configurar Trusted
          # Publisher (OIDC) en npmjs.com por paquete, borra el secret + esta
          # linea -> OIDC puro (el id-token: write de arriba ya esta).
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
